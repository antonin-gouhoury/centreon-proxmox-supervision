# Override systemd : snmptrapd.service.d/override.conf
#
# Le service snmptrapd livré par le paquet Debian est marqué "static",
# ce qui empêche son activation au démarrage via systemctl enable. Ce
# fichier override force l'activation au boot sans modifier les fichiers
# du paquet original.
#
# Emplacement : /etc/systemd/system/snmptrapd.service.d/override.conf
# Application : systemctl daemon-reload && systemctl restart snmptrapd

[Install]
WantedBy=multi-user.target
